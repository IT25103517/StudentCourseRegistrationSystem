# ================================================
# DATABASE CONNECTION SETTINGS
# ================================================
# Replace 'root1234' with YOUR MySQL password you set during installation
spring.datasource.url=jdbc:mysql://localhost:3306/university_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ================================================
# JPA / HIBERNATE SETTINGS
# ================================================
# 'update' = auto creates/updates tables when app starts (perfect for development)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ================================================
# JSP VIEW SETTINGS
# ================================================
# Tells Spring where to find .jsp files
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ================================================
# SERVER SETTINGS
# ================================================
server.port=8080
server.servlet.context-path=/university